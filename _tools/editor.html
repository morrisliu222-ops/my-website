<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生活雜記編輯器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      min-height: 100vh;
    }
    .container { width: 100%; max-width: 620px; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #111; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; margin-top: 18px; }
    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #222;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: #555; }
    textarea { height: 160px; resize: vertical; line-height: 1.7; }
    button {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #444; }
    .notice {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      display: none;
    }
    .notice.success { background: #e6f4ea; color: #2e7d32; display: block; }
    .notice.error   { background: #fdecea; color: #c62828; display: block; }
    .hint {
      margin-top: 28px;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.83rem;
      color: #888;
      line-height: 1.8;
    }
    .hint strong { color: #444; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 1.1rem; font-weight: 700; color: #111; margin-bottom: 6px; }
    .modal p { font-size: 0.88rem; color: #777; margin-bottom: 20px; }
    .modal pre {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px 16px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 0.82rem;
      color: #333;
      line-height: 1.9;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }
    .modal-close {
      width: 100%;
      padding: 10px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0;
    }
    .modal-close:hover { background: #444; }
  </style>
</head>
<body>
  <!-- Push 說明 Modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2>文章已新增！</h2>
      <p>開啟命令提示字元或 PowerShell，執行以下指令即可上線：</p>
      <pre>cd C:\Users\Morris\my_website
git add posts.js
git commit -m "新增雜記"
git push</pre>
      <p style="font-size:0.82rem;color:#aaa;margin-bottom:16px">Vercel 偵測到 push 後會自動重新部署，幾秒內上線。</p>
      <button class="modal-close" onclick="closeModal()">了解，關閉</button>
    </div>
  </div>

  <div class="container">
    <h1>生活雜記編輯器</h1>

    <label>標題</label>
    <input type="text" id="title" placeholder="今天發生的事..." />

    <label>日期</label>
    <input type="date" id="date" />

    <label>內文</label>
    <textarea id="content" placeholder="寫下你的想法..."></textarea>

    <button onclick="submit()">新增文章</button>
    <div class="notice" id="notice"></div>

    <div class="hint">
      <strong>使用方式</strong><br>
      填完表單後按「新增文章」，文章會自動寫入 posts.js 並排在最前面。<br>
      接著在終端機執行 <strong>git add posts.js && git commit -m "新增雜記" && git push</strong> 即可上線。
    </div>
  </div>

  <script>
    document.getElementById('date').value = new Date().toISOString().slice(0, 10);

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    async function submit() {
      const title   = document.getElementById('title').value.trim();
      const date    = document.getElementById('date').value.trim();
      const content = document.getElementById('content').value.trim();
      const notice  = document.getElementById('notice');

      if (!title || !date || !content) {
        notice.className = 'notice error';
        notice.textContent = '請填寫所有欄位。';
        return;
      }

      try {
        const res = await fetch('/add-post', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, date, content })
        });
        const data = await res.json();
        if (data.ok) {
          notice.className = 'notice success';
          notice.textContent = '文章已新增到 posts.js！';
          document.getElementById('title').value = '';
          document.getElementById('content').value = '';
          document.getElementById('modal').classList.add('show');
        } else {
          throw new Error(data.error);
        }
      } catch (e) {
        notice.className = 'notice error';
        notice.textContent = '寫入失敗：' + e.message;
      }
    }
  </script>
</body>
</html>
