<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的網站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
      padding: 60px 24px;
      max-width: 700px;
    }

    .hero h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .hero p {
      font-size: 1.2rem;
      color: #9ca3af;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: #a78bfa;
      border: 2px solid #7c3aed;
    }

    .btn-outline:hover {
      background: #7c3aed22;
      transform: translateY(-2px);
    }

    .cards {
      display: flex;
      gap: 24px;
      margin-top: 80px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 24px;
      max-width: 900px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 28px;
      flex: 1;
      min-width: 220px;
      max-width: 260px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #7c3aed;
      transform: translateY(-4px);
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 16px;
    }

    .card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #f3f4f6;
    }

    .card p {
      font-size: 0.95rem;
      color: #6b7280;
      line-height: 1.6;
    }

    footer {
      margin-top: 100px;
      padding: 24px;
      color: #4b5563;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>歡迎來到我的網站</h1>
    <p>這是我的第一個網頁，透過 GitHub 和 Vercel 部署上線。</p>
    <div class="buttons">
      <a class="btn btn-primary" href="#">了解更多</a>
      <a class="btn btn-outline" href="#">聯絡我</a>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-icon">🚀</div>
      <h3>快速部署</h3>
      <p>使用 Vercel 讓網站秒速上線，全球 CDN 加速。</p>
    </div>
    <div class="card">
      <div class="card-icon">🎨</div>
      <h3>自訂設計</h3>
      <p>用 HTML 和 CSS 打造屬於自己風格的頁面。</p>
    </div>
    <div class="card">
      <div class="card-icon">🔧</div>
      <h3>持續更新</h3>
      <p>推送到 GitHub 後，Vercel 自動重新部署。</p>
    </div>
  </div>

  <footer>
    &copy; 2026 我的網站 · 由 Vercel 託管
  </footer>

</body>
</html>
